<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .sidebar { width: 260px; height: 100vh; position: fixed; background: #1a252f; color: white; padding: 20px; }
        .main-content { margin-left: 260px; padding: 40px; }
        .nav-link { color: #bdc3c7; margin-bottom: 10px; transition: 0.3s; }
        .nav-link:hover { color: white; background: rgba(255,255,255,0.1); border-radius: 8px; }
        .nav-link.active { background: #34495e; color: white; border-radius: 8px; }
        .card { border-radius: 12px; transition: transform 0.2s; border: none; }
        .card:hover { transform: translateY(-5px); }
        .table thead { background: #f1f3f5; }
        .badge-visa { background-color: #0d6efd; }
        .badge-flight { background-color: #6610f2; }
        .btn-whatsapp { background-color: #25D366; color: white; border: none; }
        .btn-whatsapp:hover { background-color: #128C7E; color: white; }
    </style>
</head>
<body>

    <div class="sidebar shadow">
        <h4 class="fw-bold text-primary mb-5 px-2">ETTEHAD <span class="text-white">SEOUL</span></h4>
        <nav class="nav flex-column">
            <a class="nav-link active" href="#"><i class="bi bi-grid-1x2-fill me-2"></i> Dashboard</a>
            <button onclick="exportContacts()" class="btn btn-outline-info btn-sm mt-3 mx-2 text-start border-0 text-white-50">
                <i class="bi bi-download me-2"></i> Export Contacts
            </button>
            <a class="nav-link mt-5 text-danger" href="javascript:void(0)" id="logoutBtn"><i class="bi bi-box-arrow-left me-2"></i> Logout</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold m-0">Client Inquiries</h2>
            <span class="badge bg-dark px-3 py-2" id="adminStatus">Admin Active</span>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="card p-3 shadow-sm border-start border-primary border-5">
                    <p class="text-muted small mb-1 fw-bold">TOTAL REQUESTS</p>
                    <h2 id="totalCount" class="fw-bold">0</h2>
                </div>
            </div>
        </div>

        <div class="bg-white p-4 rounded shadow-sm border">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Client Details</th>
                            <th>Service</th>
                            <th>Destination</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="inquiryTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, deleteDoc, doc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC9GmNWEm_Hv1kk7Q3F98v-cUJLZzIQKrE",
            authDomain: "ettehad-travels.firebaseapp.com",
            databaseURL: "https://ettehad-travels-default-rtdb.firebaseio.com",
            projectId: "ettehad-travels",
            storageBucket: "ettehad-travels.firebasestorage.app",
            messagingSenderId: "390958610267",
            appId: "1:390958610267:web:ca32c3376a269e17d3cc7e",
            measurementId: "G-4LLWVKLGP1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = "login.html";
            else loadData();
        });

        function loadData() {
            const q = query(collection(db, "contact_inquiries"), orderBy("submittedAt", "desc"));
            onSnapshot(q, (snapshot) => {
                const tbody = document.getElementById('inquiryTableBody');
                tbody.innerHTML = '';
                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const id = docSnap.id;
                    const date = data.submittedAt ? new Date(data.submittedAt.seconds * 1000).toLocaleDateString('en-GB') : 'Just now';
                    const badgeClass = data.serviceType === 'Visa' ? 'badge-visa' : 'badge-flight';

                    tbody.innerHTML += `
                        <tr>
                            <td><span class="text-muted small">${date}</span></td>
                            <td>
                                <div class="fw-bold">${data.fullName}</div>
                                <div class="small text-primary"><i class="bi bi-telephone"></i> ${data.phone}</div>
                                <div class="small text-muted"><i class="bi bi-envelope"></i> ${data.email || 'N/A'}</div>
                            </td>
                            <td><span class="badge ${badgeClass}">${data.serviceType}</span></td>
                            <td><i class="bi bi-geo-alt-fill text-danger small"></i> ${data.destination}</td>
                            <td>
                                <div class="d-flex gap-2">
                                    <button class="btn btn-whatsapp btn-sm" onclick="sendWhatsApp('${data.phone}', '${data.fullName}', '${data.destination}')">
                                        <i class="bi bi-whatsapp"></i>
                                    </button>
                                    <button class="btn btn-outline-danger btn-sm border-0" onclick="deleteInquiry('${id}')">
                                        <i class="bi bi-trash3"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>`;
                });
                document.getElementById('totalCount').innerText = snapshot.size;
            });
        }

        // ✅ SMART WhatsApp Function (Fixes +92, 0082, 010 etc.)
        window.sendWhatsApp = (phone, name, destination) => {
            if (!phone) { alert("Phone number not found!"); return; }

            // 1. Sirf numbers rakhein (+, spaces wagera nikaal dein)
            let clean = phone.replace(/\D/g, ''); 

            // 2. Agar number 00 se shuru ho rha hy (e.g. 0082 ya 0092), to 00 nikaal dein
            if (clean.startsWith('00')) { clean = clean.substring(2); }

            // 3. Agar abhi bhi number 0 se shuru ho rha hy (e.g. 0300 or 010), to country code lagayein
            if (clean.startsWith('0')) {
                // Agar 010, 011 wagera hy to Korea (82), agar 03 hy to Pakistan (92)
                if (clean.startsWith('010') || clean.startsWith('011')) {
                    clean = '82' + clean.substring(1);
                } else {
                    clean = '92' + clean.substring(1);
                }
            }

            const defaultMsg = `Hello ${name}, this is Ettehad Travels Seoul. We have new updates regarding visas for ${destination}.`;
            const customMessage = prompt("Enter message:", defaultMsg);

            if (customMessage) {
                // Seedha WhatsApp API call
                window.open(`https://api.whatsapp.com/send?phone=${clean}&text=${encodeURIComponent(customMessage)}`, '_blank');
            }
        };

        window.deleteInquiry = async (id) => {
            if(confirm("Delete this inquiry?")) await deleteDoc(doc(db, "contact_inquiries", id));
        };

        window.exportContacts = async () => {
            const querySnapshot = await getDocs(collection(db, "contact_inquiries"));
            let csv = "Name,Phone,Destination\n";
            querySnapshot.forEach(doc => {
                const d = doc.data();
                csv += `"${d.fullName}","${d.phone}","${d.destination}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Ettehad_Clients.csv';
            a.click();
        };

        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth).then(() => { window.location.href = "login.html"; });
        });
    </script>
</body>
</html>
