<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Ettehad Travels</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0a192f; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 400px; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-dark">ADMIN <span class="text-primary">LOGIN</span></h3>
            <p class="text-muted small">Ettehad Travels Seoul Portal</p>
        </div>
        
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label small fw-bold text-secondary">EMAIL ADDRESS</label>
                <input type="email" id="email" class="form-control p-3 shadow-none" placeholder="admin@ettehad-travels.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold text-secondary">PASSWORD</label>
                <input type="password" id="password" class="form-control p-3 shadow-none" placeholder="••••••••" required>
            </div>
            <button type="submit" id="loginBtn" class="btn btn-primary w-100 py-3 fw-bold">SIGN IN</button>
        </form>
        
        <div id="errorMessage" class="text-danger mt-3 small text-center d-none">Invalid email or password.</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC9GmNWEm_Hv1kk7Q3F98v-cUJLZzIQKrE",
            authDomain: "ettehad-travels.firebaseapp.com",
            databaseURL: "https://ettehad-travels-default-rtdb.firebaseio.com",
            projectId: "ettehad-travels",
            storageBucket: "ettehad-travels.firebasestorage.app",
            messagingSenderId: "390958610267",
            appId: "1:390958610267:web:ca32c3376a269e17d3cc7e",
            measurementId: "G-4LLWVKLGP1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMessage');

            btn.disabled = true;
            btn.innerText = "VERIFYING...";

            signInWithEmailAndPassword(auth, email, password)
                .then(() => { window.location.href = "index.html"; })
                .catch((error) => {
                    errorMsg.classList.remove('d-none');
                    btn.disabled = false;
                    btn.innerText = "SIGN IN";
                });
        });
    </script>
</body>
</html>
